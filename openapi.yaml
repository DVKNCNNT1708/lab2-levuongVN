openapi: 3.1.0
info:
  title: Camera Stream → AI Vision API
  version: 1.0.0
  description: |
    Hợp đồng API giữa Camera Stream (Consumer) và AI Vision (Provider).
    API này hỗ trợ phát hiện đối tượng từ frame hoặc metadata do Camera Stream gửi.
  contact:
    name: FIT4110 Teaching Team
    email: fit4110@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
tags:
  - name: vision
    description: Quản lý phát hiện đối tượng
paths:
  /vision/detect:
    post:
      operationId: detectObjects
      summary: Phát hiện đối tượng từ frame hoặc metadata
      description: |
        Consumer gửi frame hoặc metadata để AI Vision phát hiện đối tượng.
      tags: [vision]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectRequest'
            examples:
              example1:
                value:
                  imageUrl: "https://example.com/frame.jpg"
                  metadata:
                    cameraId: "CAM-001"
                    timestamp: "2026-05-10T08:00:00Z"
      responses:
        '200':
          description: Kết quả phát hiện đối tượng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vision/detections/{detectionId}:
    get:
      operationId: getDetectionResult
      summary: Lấy kết quả phát hiện đối tượng
      description: |
        Consumer kiểm tra kết quả phát hiện đối tượng bằng detectionId.
      tags: [vision]
      parameters:
        - name: detectionId
          in: path
          required: true
          description: ID của kết quả phát hiện.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Kết quả phát hiện đối tượng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vision/models/info:
    get:
      operationId: getModelInfo
      summary: Lấy thông tin model AI Vision
      description: |
        Consumer lấy thông tin model AI Vision hiện tại, bao gồm tên và phiên bản.
      tags: [vision]
      responses:
        '200':
          description: Thông tin model AI Vision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfo'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    DetectRequest:
      type: object
      additionalProperties: false
      required: [imageUrl]
      properties:
        imageUrl:
          type: string
          format: uri
          description: URL của ảnh cần detect.
        metadata:
          type: object
          additionalProperties: false
          properties:
            cameraId:
              type: string
              description: ID của camera.
            timestamp:
              type: string
              format: date-time
              description: Thời điểm chụp frame.

    DetectResponse:
      type: object
      additionalProperties: false
      required: [detectionId, objects]
      properties:
        detectionId:
          type: string
          format: uuid
          description: ID của kết quả phát hiện.
        objects:
          type: array
          items:
            type: object
            required: [name, confidence, riskLevel]
            properties:
              name:
                type: string
                description: Tên đối tượng phát hiện.
              confidence:
                type: number
                format: float
                minimum: 0
                maximum: 1
                description: Độ tin cậy của phát hiện.
              riskLevel:
                type: string
                enum: [LOW, MEDIUM, HIGH, CRITICAL]
                description: Mức độ rủi ro của đối tượng.

    ModelInfo:
      type: object
      additionalProperties: false
      required: [modelName, version]
      properties:
        modelName:
          type: string
          description: Tên của model AI Vision.
        version:
          type: string
          description: Phiên bản của model.
        description:
          type: string
          description: Mô tả ngắn gọn về model.

  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: "https://example.com/errors/validation"
              title:
                type: string
                example: "Dữ liệu không hợp lệ"
              status:
                type: integer
                example: 400
              detail:
                type: string
                example: "Payload không đúng JSON Schema"

    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: "https://example.com/errors/not-found"
              title:
                type: string
                example: "Không tìm thấy tài nguyên"
              status:
                type: integer
                example: 404
              detail:
                type: string
                example: "Không tìm thấy detectionId"

    InternalServerError:
      description: Lỗi không mong muốn phía server
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: "https://example.com/errors/internal-server-error"
              title:
                type: string
                example: "Lỗi hệ thống"
              status:
                type: integer
                example: 500
              detail:
                type: string
                example: "Có lỗi xảy ra trong hệ thống"